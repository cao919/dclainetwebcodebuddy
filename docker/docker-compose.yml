version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: marketing-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: marketing_ai_db
      MYSQL_USER: marketing_ai_user
      MYSQL_PASSWORD: marketing_ai_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - marketing-ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "marketing_ai_user", "-pmarketing_ai_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis缓存和队列
  redis:
    image: redis:7-alpine
    container_name: marketing-ai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - marketing-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 后端Nest.js应用
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: marketing-ai-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://marketing_ai_user:marketing_ai_password@mysql:3306/marketing_ai_db
      REDIS_URL: redis://redis:6379
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_change_in_production}
      PORT: 3000
    volumes:
      - ../backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketing-ai-network
    restart: unless-stopped
    command: npm run start:dev

  # 前端Vue应用
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: marketing-ai-frontend
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
      VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      VITE_AUTH0_REDIRECT_URI: http://localhost:5173/callback
      VITE_AUTH0_LOGOUT_REDIRECT_URI: http://localhost:5173
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - marketing-ai-network
    restart: unless-stopped
    command: npm run dev -- --host

  # Nginx反向代理（生产环境）
  nginx:
    image: nginx:alpine
    container_name: marketing-ai-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ../frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - marketing-ai-network
    restart: unless-stopped

  # Prisma Studio数据库管理
  prisma-studio:
    image: node:18-alpine
    container_name: marketing-ai-prisma-studio
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: mysql://marketing_ai_user:marketing_ai_password@mysql:3306/marketing_ai_db
    ports:
      - "5555:5555"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - marketing-ai-network
    command: npx prisma studio --host 0.0.0.0 --port 5555
    restart: unless-stopped

  # Redis Commander管理界面
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: marketing-ai-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - marketing-ai-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  marketing-ai-network:
    driver: bridge